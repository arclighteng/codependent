# codependent — runtime configuration
# See 2026-04-15-resilience-platform-design.md for documentation.

# Health check
check_interval=30
health_check=status_page

# Recovery detection (sliding window)
recovery_successes=10
recovery_window=12

# Failure detection
failure_window=4

# Rate limit / degraded state
degraded_threshold=600

# Actions
on_recovery=notify
on_failure=notify

# Notification — comma-separated list. Channels: terminal, toast, slack, webhook.
# Legacy: "both" = "terminal,toast"
notify_method=both

# Slack incoming webhook URL (used when "slack" is in notify_method)
notify_slack_url=

# Generic JSON webhook URL (used when "webhook" is in notify_method)
# Payload: {timestamp, level, event, message}
notify_webhook_url=

# Metrics
log_to_metrics=true

# Local model (used by Tier 3)
local_model=gemma3

# Project discovery for config generation
project_roots=~/Projects

# Daemon lifecycle (reserved — monitor runs until explicitly stopped)
# heartbeat_timeout=600

# Network check (corporate proxy users: set to internal endpoint)
network_check_url=https://1.1.1.1

# Log management
max_log_size=1048576
